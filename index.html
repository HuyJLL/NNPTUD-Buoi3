<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .product-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
        }
        .sortable {
            cursor: pointer;
            user-select: none;
        }
        .sortable:hover {
            background-color: #f8f9fa;
        }
        /* Rút gọn text description nếu cần */
        .desc-tooltip {
            cursor: help;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h2 class="mb-4">Quản lý Sản Phẩm</h2>
        
        <div class="row mb-3 align-items-center">
            <div class="col-md-3">
                <input type="text" id="searchInput" class="form-control" placeholder="Tìm kiếm theo Title...">
            </div>
            <div class="col-md-2">
                <select id="pageSizeSelect" class="form-select">
                    <option value="5">5 / trang</option>
                    <option value="10" selected>10 / trang</option>
                    <option value="20">20 / trang</option>
                </select>
            </div>
            <div class="col-md-7 text-end">
                <button class="btn btn-success" onclick="exportCSV()"><i class="bi bi-filetype-csv"></i> Xuất file CSV</button>
                <button class="btn btn-primary" onclick="openCreateModal()"><i class="bi bi-plus-circle"></i> Thêm mới</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Hình ảnh</th>
                        <th class="sortable" onclick="handleSort('title')">
                            Title <i class="bi bi-arrow-down-up float-end"></i>
                        </th>
                        <th class="sortable" onclick="handleSort('price')">
                            Price ($) <i class="bi bi-arrow-down-up float-end"></i>
                        </th>
                        <th>Category</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>

        <nav>
            <ul class="pagination justify-content-end" id="pagination">
                </ul>
        </nav>
    </div>

    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Chi tiết sản phẩm</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="text-center mb-3">
                        <img id="detailImage" src="" alt="Product" class="img-fluid rounded" style="max-height: 200px;">
                    </div>
                    <p><strong>ID:</strong> <span id="detailId"></span></p>
                    <p><strong>Title:</strong> <span id="detailTitle"></span></p>
                    <p><strong>Price:</strong> $<span id="detailPrice"></span></p>
                    <p><strong>Category:</strong> <span id="detailCategory"></span></p>
                    <p><strong>Description:</strong></p>
                    <p id="detailDescription" class="text-muted"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-warning" onclick="openEditModal()"><i class="bi bi-pencil"></i> Edit</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="formModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="formModalTitle">Thêm Sản Phẩm</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="productForm">
                        <input type="hidden" id="formId">
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" class="form-control" id="formTitle" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Price</label>
                            <input type="number" class="form-control" id="formPrice" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="formDescription" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Image URL</label>
                            <input type="url" class="form-control" id="formImage" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Category ID</label>
                            <input type="number" class="form-control" id="formCategoryId" value="1" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary" onclick="saveProduct()">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
